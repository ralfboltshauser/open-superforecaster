<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientTransform="matrix(0 520 -720 0 720 360)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12202b"/>
      <stop offset="0.62" stop-color="#090b0f"/>
      <stop offset="1" stop-color="#06070a"/>
    </radialGradient>
    <linearGradient id="accent" x1="264" y1="126" x2="1180" y2="728" gradientUnits="userSpaceOnUse">
      <stop stop-color="#72c4ff"/>
      <stop offset="0.55" stop-color="#6aefc6"/>
      <stop offset="1" stop-color="#f2c15c"/>
    </linearGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.45 0 0 0 0 0.77 0 0 0 0 1 0 0 0 0.28 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .mono { font-family: "Geist Mono", "SFMono-Regular", Consolas, monospace; }
      .sans { font-family: "Geist", Inter, ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #f1f5fb; font-size: 25px; font-weight: 650; }
      .meta { fill: #98a3b7; font-size: 16px; }
      .eyebrow { fill: #72c4ff; font-size: 13px; letter-spacing: 5px; text-transform: uppercase; }
      .box { fill: rgba(13, 17, 23, 0.82); stroke: rgba(151, 164, 190, 0.24); stroke-width: 1.4; }
      .box-strong { fill: rgba(13, 17, 23, 0.94); stroke: rgba(114, 196, 255, 0.52); stroke-width: 1.6; }
      .line { stroke: rgba(151, 164, 190, 0.24); stroke-width: 1.4; }
      .flow { stroke: url(#accent); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .dot-blue { fill: #72c4ff; }
      .dot-green { fill: #6aefc6; }
      .dot-amber { fill: #f2c15c; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M2 2L10 6L2 10" stroke="#6aefc6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <path d="M145 736C324 561 442 609 602 407C772 192 980 203 1290 111" stroke="rgba(114,196,255,0.08)" stroke-width="1.2"/>
  <path d="M167 150C403 245 410 446 642 465C903 487 1010 698 1280 742" stroke="rgba(106,239,198,0.08)" stroke-width="1.2"/>

  <g transform="translate(88 76)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="#0d1117" stroke="rgba(114,196,255,0.4)" stroke-width="1.5"/>
    <path d="M19 43L32 17L45 43" stroke="url(#accent)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M25 34H39" stroke="#f1f5fb" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="19" cy="43" r="3" fill="#72c4ff"/>
    <circle cx="45" cy="43" r="3" fill="#72c4ff"/>
    <circle cx="32" cy="17" r="3" fill="#6aefc6"/>
  </g>
  <text x="176" y="106" class="mono eyebrow">Open Superforecaster</text>
  <text x="176" y="148" class="sans label" font-size="36">Local forecasting appliance</text>
  <text x="176" y="182" class="mono meta">Forecasts, sources, traces, artifacts, and benchmarks stay inspectable on your machine.</text>

  <g transform="translate(104 276)">
    <rect class="box-strong" width="270" height="154" rx="14"/>
    <circle cx="34" cy="40" r="8" class="dot-blue"/>
    <text x="56" y="49" class="sans label">Next.js UI</text>
    <text x="28" y="86" class="mono meta">forecast composer</text>
    <text x="28" y="114" class="mono meta">run detail cockpit</text>
    <text x="28" y="142" class="mono meta">benchmark lab</text>
  </g>

  <g transform="translate(440 276)">
    <rect class="box" width="270" height="154" rx="14"/>
    <circle cx="34" cy="40" r="8" class="dot-green"/>
    <text x="56" y="49" class="sans label">Route handlers</text>
    <text x="28" y="86" class="mono meta">/api/runs</text>
    <text x="28" y="114" class="mono meta">/api/benchmarks</text>
    <text x="28" y="142" class="mono meta">/api/diagnostics</text>
  </g>

  <g transform="translate(786 184)">
    <rect class="box" width="250" height="128" rx="14"/>
    <circle cx="33" cy="38" r="8" class="dot-blue"/>
    <text x="55" y="47" class="sans label">Postgres</text>
    <text x="28" y="84" class="mono meta">product ledger</text>
    <text x="28" y="112" class="mono meta">tasks, rows, scores</text>
  </g>

  <g transform="translate(786 376)">
    <rect class="box" width="250" height="128" rx="14"/>
    <circle cx="33" cy="38" r="8" class="dot-green"/>
    <text x="55" y="47" class="sans label">MinIO</text>
    <text x="28" y="84" class="mono meta">trace bundles</text>
    <text x="28" y="112" class="mono meta">CSV, Parquet, evals</text>
  </g>

  <g transform="translate(786 568)">
    <rect class="box" width="250" height="128" rx="14"/>
    <circle cx="33" cy="38" r="8" class="dot-amber"/>
    <text x="55" y="47" class="sans label">DuckDB</text>
    <text x="28" y="84" class="mono meta">local analytics mart</text>
    <text x="28" y="112" class="mono meta">benchmark inspection</text>
  </g>

  <g transform="translate(1082 276)">
    <rect class="box-strong" width="302" height="154" rx="14"/>
    <circle cx="34" cy="40" r="8" class="dot-green"/>
    <text x="56" y="49" class="sans label">Smithers worker</text>
    <text x="28" y="86" class="mono meta">durable orchestration</text>
    <text x="28" y="114" class="mono meta">workflow variants</text>
    <text x="28" y="142" class="mono meta">retryable agent runs</text>
  </g>

  <g transform="translate(1082 542)">
    <rect class="box-strong" width="302" height="154" rx="14"/>
    <circle cx="34" cy="40" r="8" class="dot-blue"/>
    <text x="56" y="49" class="sans label">CodexAgent</text>
    <text x="28" y="86" class="mono meta">research fan-out</text>
    <text x="28" y="114" class="mono meta">forecast synthesis</text>
    <text x="28" y="142" class="mono meta">source extraction</text>
  </g>

  <path class="flow" d="M374 353H430" marker-end="url(#arrow)"/>
  <path class="flow" d="M710 353C748 353 748 248 786 248" marker-end="url(#arrow)"/>
  <path class="flow" d="M710 353H786" marker-end="url(#arrow)"/>
  <path class="flow" d="M710 353C750 353 748 632 786 632" marker-end="url(#arrow)"/>
  <path class="flow" d="M1036 353H1072" marker-end="url(#arrow)"/>
  <path class="flow" d="M1233 430V532" marker-end="url(#arrow)"/>

  <g filter="url(#soft-glow)">
    <circle cx="430" cy="353" r="4" class="dot-green"/>
    <circle cx="786" cy="248" r="4" class="dot-blue"/>
    <circle cx="786" cy="632" r="4" class="dot-amber"/>
    <circle cx="1072" cy="353" r="4" class="dot-green"/>
    <circle cx="1233" cy="532" r="4" class="dot-blue"/>
  </g>

  <g transform="translate(112 760)">
    <rect class="box" width="1216" height="86" rx="14"/>
    <text x="28" y="35" class="mono meta" font-size="15">Trust loop: each run keeps the question, forecast, evidence, citations, traces, artifacts,</text>
    <text x="28" y="63" class="mono meta" font-size="15">benchmark context, and export paths inspectable.</text>
  </g>
